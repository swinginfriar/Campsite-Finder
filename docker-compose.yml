# CampSage — clone this repo into Dockhand and hit "up". No env vars to set.
#
#   web      serves the phone page at  http://<host>:5001/camp  (+ /camp/map, /camp/settings)
#   scanner  refreshes results on a schedule (recreation.gov + ReserveCalifornia)
#
# Configure everything (home base, radius, rating bars, window, scan interval …)
# in the browser at /camp/settings. It's saved to the shared campsage-data volume
# that both services read — no API keys, no environment variables.

services:
  web:
    build: .
    image: campsage:latest
    container_name: campsage-web
    restart: unless-stopped
    ports:
      - "5001:5001"        # change the LEFT number to remap the host port
    volumes:
      - campsage-data:/data
    command: python campsage_web.py

  scanner:
    image: campsage:latest
    build: .
    container_name: campsage-scanner
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - campsage-data:/data
    command: python scheduler.py

volumes:
  campsage-data:
